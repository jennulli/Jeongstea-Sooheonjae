<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정차/수헌재 근무 관리</title>
    <style>
        @font-face {
            font-family: 'Gowun Batang';
            src: url('GowunBatang-Regular.ttf') format('truetype');
        }

        :root {
            --text-main: #2C2C2C;
            --bg-color: #F8F8F8;
            --border-color: #E5E5E5;
            --highlight: #E8E8E8;
            --today-color: #E0E0E0;
        }

        body {
            font-family: 'Gowun Batang', serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(248, 248, 248, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
            font-size: 1.4rem;
            font-weight: bold;
            display: none;
        }
        
        .back-btn {
            position: absolute;
            left: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Gowun Batang', serif;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            padding-top: 30px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
        }

        .brush-title-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
        }

        .brush-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
            text-align: center;
            padding: 10px 20px;
            letter-spacing: 2px;
        }

        .landing-store {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .landing-text-vertical {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 1.4rem;
            letter-spacing: 3px;
            font-weight: bold;
            margin-top: 0;
        }

        .landing-image {
            width: calc(50% - 15px);
            height: auto;
            aspect-ratio: 4/3;
            object-fit: cover;
            object-position: right center;
            filter: brightness(0.75) contrast(1.05);
        }

        /* 수헌재 이미지 너비 완벽 정렬 (잘림 방지) */
        .landing-image.suhyun-img {
            width: calc(50% - 15px); /* 파란색 선 시안과 완벽하게 일치 */
            height: auto;
            aspect-ratio: auto;
            object-fit: initial;
            display: block;
        }

        .landing-divider {
            width: 100%;
            height: 1px;
            background-color: var(--text-main);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px 0;
        }
        .landing-divider::after {
            content: "○";
            position: absolute;
            background-color: var(--bg-color);
            padding: 0 10px;
            font-size: 0.8rem;
        }

        .char-fade {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .card {
            border: 1px solid var(--border-color);
            padding: 30px;
            background-color: #FFFFFF;
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .total-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .month-header {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            min-width: 500px;
        }

        .cal-head-cell, .cal-day-cell {
            background-color: #FFFFFF;
            padding: 4px;
            text-align: center;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .cal-head-cell {
            min-height: auto;
            padding-bottom: 10px;
            font-size: 0.9rem;
            color: #777;
        }
        .date-num {
            font-size: 0.8rem;
            text-align: left;
            margin-bottom: 4px;
        }
        .date-num.sunday { color: #D32F2F; }
        .date-num.saturday { color: #1976D2; }
        .date-num.today {
            background-color: var(--text-main);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .badge {
            background-color: #F5F5F5;
            padding: 2px;
            font-size: 0.65rem;
            text-align: center;
            border: 1px solid var(--border-color);
            line-height: 1.2;
        }

        .employee-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .emp-btn {
            border: 1px solid var(--text-main);
            background: none;
            padding: 12px 8px;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: 'Gowun Batang', serif;
            text-align: center;
            transition: all 0.2s;
        }
        .emp-btn:active {
            background-color: var(--text-main);
            color: #FFFFFF;
        }

        .total-btn {
            border: 1px solid var(--text-main);
            background: none;
            padding: 6px 12px;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'Gowun Batang', serif;
        }
        .total-btn:active { background-color: var(--highlight); }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-box {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            font-size: 1.1rem;
            font-family: 'Gowun Batang', serif;
            text-align: center;
            background-color: var(--bg-color);
        }
        .input-box::placeholder {
            font-size: 0.85rem;
        }
        .input-box:focus {
            outline: none;
            border-color: var(--text-main);
        }

        .break-grid {
            display: flex;
            gap: 10px;
        }
        .break-btn {
            flex: 1;
            padding: 10px 0;
            border: 1px solid var(--border-color);
            background: none;
            font-family: 'Gowun Batang', serif;
            cursor: pointer;
        }
        .break-btn.active {
            border-color: var(--text-main);
            background-color: var(--text-main);
            color: #FFFFFF;
        }

        .result-box {
            text-align: center;
            font-size: 1.3rem;
            margin: 20px 0;
            padding: 15px;
            border: 1px solid var(--text-main);
            background-color: var(--highlight);
            display: none;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .summary-table th, .summary-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
        .summary-table th { font-weight: bold; border-bottom: 2px solid var(--text-main); }

        .total-box {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            border: 1px solid var(--border-color);
        }

        .accordion-item {
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
            font-size: 1.1rem;
        }
        .accordion-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .accordion-body {
            display: none;
            padding-top: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #555;
        }
        .btn-edit {
            background: none;
            border: 1px solid #777;
            padding: 4px 8px;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: 'Gowun Batang', serif;
        }

        #toast {
            display: none;
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--text-main);
            color: white;
            padding: 14px 28px;
            font-size: 1.1rem;
            z-index: 1000;
        }

        /* 모바일 대응 (반응형) */
        @media (max-width: 600px) {
            .header { font-size: 1.15rem; }
            .back-btn { left: 10px; font-size: 1.2rem; }
            .calendar-grid { min-width: 100%; }
            .landing-text-vertical { font-size: 0.95rem; }
            .brush-title { font-size: 1.2rem; }
            .brush-title-wrapper { margin-bottom: 50px; }
            .landing-image { width: calc(50% - 10px); }
            .landing-image.suhyun-img { width: calc(50% - 10px); }
            .badge { font-size: 0.5rem; padding: 1px; line-height: 1.1; letter-spacing: -0.5px; word-break: break-all; }
            .cal-day-cell { padding: 1px; min-height: 40px; }
            .date-num { font-size: 0.7rem; }
            .cal-head-cell { font-size: 0.75rem; padding-bottom: 4px; }
            h2 { font-size: 0.9rem; margin-bottom: 12px; }
            .total-title-row { flex-direction: row; justify-content: space-between; align-items: center; gap: 8px; }
            .total-btn { padding: 4px 8px; font-size: 0.85rem; }
            .employee-grid { gap: 6px; }
            .emp-btn { padding: 8px 4px; font-size: 0.85rem; }
            .card { padding: 12px; }
            .container { width: 95%; padding-top: 15px; }
            .input-row { flex-wrap: wrap; }
            .input-box { font-size: 0.95rem; padding: 6px; }
            .action-btn { font-size: 1.0rem; padding: 10px; }
            .summary-table th, .summary-table td { font-size: 0.8rem; padding: 8px 4px; }
        }
    </style>
</head>
<body>

    <div class="header" id="main-header">
        <button class="back-btn" id="back-btn" onclick="goHome()">〈</button>
        <span id="header-title">근무 관리</span>
    </div>

    <!-- 1. 랜딩 뷰 -->
    <div id="landing-view" class="container">
        <div class="brush-title-wrapper">
            <div class="brush-title">정차/수헌재 근무 관리</div>
        </div>

        <div class="landing-store" onclick="selectStore('jungcha', '정이 있는 차')">
            <div class="landing-text-vertical">
                <span class="char-fade" style="animation-delay: 0.2s;">정</span>
                <span class="char-fade" style="animation-delay: 0.4s;">이</span>
                <span class="char-fade" style="animation-delay: 0.6s;">있</span>
                <span class="char-fade" style="animation-delay: 0.8s;">는</span>
                <span class="char-fade" style="animation-delay: 1.0s;">차</span>
            </div>
            <img src="정차.png" class="landing-image char-fade" style="animation-delay: 1.4s;" alt="정이 있는 차">
        </div>

        <div class="landing-divider"></div>

        <div class="landing-store" onclick="selectStore('suhyun', '수헌재')">
            <img src="수헌재.png" class="landing-image suhyun-img char-fade" style="animation-delay: 1.8s;" alt="수헌재">
            <div class="landing-text-vertical" style="text-align: right;">
                <span class="char-fade" style="animation-delay: 2.2s;">수</span>
                <span class="char-fade" style="animation-delay: 2.4s;">헌</span>
                <span class="char-fade" style="animation-delay: 2.6s;">재</span>
            </div>
        </div>
    </div>

    <!-- 2. 메인 뷰 (달력 + 직원) -->
    <div id="main-view" class="container" style="display:none;">
        <div class="card" style="margin-bottom: 20px;">
            <div class="month-header">
                <span style="margin-right: 15px;">◀</span>
                <span>2026년 6월 스케줄</span>
                <span style="margin-left: 15px;">▶</span>
            </div>
            <div style="overflow-x: auto;">
                <div class="calendar-grid" id="calendar-grid"></div>
            </div>
        </div>

        <div class="card">
            <div class="total-title-row">
                <h2>근무 시간 입력 (직원 선택)</h2>
                <button class="total-btn" onclick="openTotalView()">전체 근무 시간</button>
            </div>
            <div class="employee-grid" id="employee-list">
                <!-- JS 렌더링 -->
            </div>
        </div>
    </div>

    <!-- 3. 상세 입력 뷰 -->
    <div id="detail-view" class="container" style="display:none;">
        <div class="card" style="margin-bottom:20px;">
            <div class="total-title-row">
                <h2>나의 근무 요약 (<span id="selected-employee-name"></span>)</h2>
                <button class="btn-edit" onclick="goBackToMainFromDetail()">스케줄표 보기</button>
            </div>
            <table class="summary-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>지점</th>
                        <th>총 시간</th>
                        <th>수정</th>
                    </tr>
                </thead>
                <tbody id="summary-table-body">
                    <!-- JS 랜더링 -->
                </tbody>
            </table>
            <div class="total-box" id="summary-total-box">
                총 누적 근무: <span style="font-weight:bold;">0</span> 시간
            </div>
        </div>

        <div class="card" id="form-card">
            <h2>근무 시간 입력</h2>
            
            <div class="form-group">
                <label>날짜 입력</label>
                <div class="input-row">
                    <input type="number" id="input-month" class="input-box" min="1" max="12" placeholder="월" value="6">
                    <span>월</span>
                    <input type="number" id="input-day" class="input-box" min="1" max="31" placeholder="일" value="">
                    <span>일</span>
                </div>
            </div>

            <div class="form-group">
                <label>출근 시간</label>
                <div class="input-row">
                    <input type="number" id="start-hour" class="input-box" min="0" max="24" placeholder="시 (예: 10)" oninput="calculateTime()">
                    <span>:</span>
                    <input type="number" id="start-min" class="input-box" min="0" max="59" placeholder="분 (예: 30)" oninput="calculateTime()">
                </div>
            </div>
            
            <div class="form-group">
                <label>퇴근 시간</label>
                <div class="input-row">
                    <input type="number" id="end-hour" class="input-box" min="0" max="24" placeholder="시 (예: 17)" oninput="calculateTime()">
                    <span>:</span>
                    <input type="number" id="end-min" class="input-box" min="0" max="59" placeholder="분 (예: 0)" oninput="calculateTime()">
                </div>
            </div>

            <div class="form-group">
                <label>휴게 시간 (식사 등)</label>
                <div class="break-grid">
                    <button class="break-btn active" onclick="setBreakTime(0, this)">없음</button>
                    <button class="break-btn" onclick="setBreakTime(0.5, this)">0.5</button>
                    <button class="break-btn" onclick="setBreakTime(1.0, this)">1.0</button>
                </div>
            </div>

            <div id="result-box" class="result-box"></div>

            <button class="emp-btn" style="width:100%; border:1px solid var(--text-main); background:var(--text-main); color:#fff; padding:15px; margin-top:20px;" onclick="saveRecord()">저장하기</button>
        </div>
    </div>

    <!-- 4. 전체 근무 요약 뷰 -->

        <div class="card">
            <div class="total-title-row">
                <h2>전체 직원 근무 요약</h2>
                <button class="btn-edit" onclick="goBackToMainFromTotal()">뒤로 가기</button>
            </div>
            <div id="total-list-container">
                <!-- JS 아코디언 랜더링 -->
            </div>
        </div>
    </div>

    <div id="toast">✅ 추가되었습니다.</div>

        let userAddedRecords = [];
        let userAddedEmployees = { 'jungcha': [], 'suhyun': [] };

        let currentStoreId = '';
        let currentEmployee = '';
        let selectedBreakTime = 0;
        let toastTimeout;

        onSnapshot(recordsRef, (snapshot) => {
            const records = [];
            snapshot.forEach(doc => {
                records.push({ id: doc.id, ...doc.data() });
            });
            records.sort((a,b) => (a.createdAt || 0) - (b.createdAt || 0));
            userAddedRecords = records;
            refreshUI();
        });

        onSnapshot(empDocRef, (snapshot) => {
            if (snapshot.exists()) {
                userAddedEmployees = snapshot.data();
            } else {
                setDoc(empDocRef, userAddedEmployees);
            }
            refreshUI();
        });

        async function migrateLocalData() {
            const localRecs = JSON.parse(localStorage.getItem('cafeUserRecords'));
            const localEmps = JSON.parse(localStorage.getItem('cafeNewEmps'));
            
            if (localRecs && localRecs.length > 0) {
                for (const r of localRecs) {
                    await addDoc(recordsRef, { ...r, createdAt: new Date().getTime() });
                }
                localStorage.removeItem('cafeUserRecords');
            }
            if (localEmps) {
                await setDoc(empDocRef, localEmps);
                localStorage.removeItem('cafeNewEmps');
            }
        }
        migrateLocalData();

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash;
            document.getElementById('landing-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('total-view').style.display = 'none';
            document.getElementById('main-header').style.display = 'none';

            if(hash === '#main') {
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('main-view').style.display = 'flex';
                if(currentStoreId) {
                    window.renderCalendar(currentStoreId);
                    window.renderEmployeeList(currentStoreId);
                }
            } else if(hash === '#detail') {
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('detail-view').style.display = 'flex';
            } else if(hash === '#total') {
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('total-view').style.display = 'flex';
            } else {
                document.getElementById('landing-view').style.display = 'flex';
            }
        });
        
        if(!window.location.hash) {
            window.location.hash = '#landing';
        } else {
            window.dispatchEvent(new Event('hashchange'));
        }

        function refreshUI() {
            if (document.getElementById('main-view').style.display === 'flex') {
                window.renderCalendar(currentStoreId);
                window.renderEmployeeList(currentStoreId);
            }
            if (document.getElementById('detail-view').style.display === 'flex') {
                window.updateSummaryTable();
            }
            if (document.getElementById('total-view').style.display === 'flex') {
                window.openTotalView();
            }
        }

        window.showMessage = function(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        window.goHome = function() {
            window.location.hash = '#landing';
        }

        window.selectStore = function(storeId, storeName) {
            currentStoreId = storeId;
            document.getElementById('header-title').innerText = storeName + ' 근무 관리';
            window.location.hash = '#main';
        }

        window.renderCalendar = function(storeId) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach(day => { grid.innerHTML += `<div class="cal-head-cell">${day}</div>`; });
            grid.innerHTML += `<div class="cal-day-cell"></div>`;

            const schedules = storeData[storeId].schedules;
            for (let i = 1; i <= 30; i++) {
                let isToday = (i === new Date().getDate()) ? 'today' : '';
                let dayOfWeek = new Date(`2026-06-${i.toString().padStart(2, '0')}`).getDay();
                let colorClass = dayOfWeek === 0 ? 'sunday' : (dayOfWeek === 6 ? 'saturday' : '');
                
                let badgesHTML = '';
                
                const manualEmpsOnDay = new Set();
                const manualBadges = [];
                
                userAddedRecords.forEach(rec => {
                    if (rec.storeId === storeId && rec.month == 6 && rec.day == i) {
                        manualEmpsOnDay.add(rec.emp);
                        manualBadges.push(`<div class="badge" style="border:2px solid var(--text-main); background:#fff; font-weight:bold;">${rec.emp} <br> ${rec.timeRange}</div>`);
                    }
                });

                if(schedules[i]) {
                    schedules[i].forEach(sch => {
                        if(!manualEmpsOnDay.has(sch.n)) {
                            badgesHTML += `<div class="badge">${sch.n} <br> ${sch.t}</div>`;
                        }
                    });
                }
                
                badgesHTML += manualBadges.join('');

                grid.innerHTML += `
                    <div class="cal-day-cell">
                        <div class="date-num ${isToday} ${colorClass}">${i}</div>
                        ${badgesHTML}
                    </div>
                `;
            }
        }

        window.renderEmployeeList = function(storeId) {
            const list = document.getElementById('employee-list');
            list.innerHTML = '';
            const allEmps = [...storeData[storeId].employees, ...(userAddedEmployees[storeId] || [])];
            const uniqueEmp = [...new Set(allEmps)].sort();
            
            uniqueEmp.forEach(emp => {
                list.innerHTML += `<button class="emp-btn" onclick="openDetail('${emp}')">${emp}</button>`;
            });
            
            list.innerHTML += `<button class="emp-btn" style="border-style: dashed; color: #555;" onclick="addNewEmployee()">+ 직원 추가</button>`;
        }
        
        window.addNewEmployee = async function() {
            const name = prompt("새로운 알바생(직원)의 이름을 입력하세요:");
            if(name && name.trim() !== '') {
                const trimmedName = name.trim();
                const allEmps = [...storeData[currentStoreId].employees, ...(userAddedEmployees[currentStoreId] || [])];
                if(allEmps.includes(trimmedName)) {
                    window.showMessage("이미 존재하는 이름입니다.");
                } else {
                    userAddedEmployees[currentStoreId].push(trimmedName);
                    await setDoc(empDocRef, userAddedEmployees);
                    window.showMessage("새 직원이 추가되었습니다.");
                }
            }
        }

        window.openDetail = function(employeeName) {
            currentEmployee = employeeName;
            document.getElementById('selected-employee-name').innerText = employeeName;
            
            document.getElementById('input-month').value = '6';
            document.getElementById('input-day').value = '';
            document.getElementById('start-hour').value = '';
            document.getElementById('start-min').value = '';
            document.getElementById('end-hour').value = '';
            document.getElementById('end-min').value = '';
            document.getElementById('result-box').style.display = 'none';
            window.setBreakTime(0, document.querySelectorAll('.break-btn')[0]);

            window.updateSummaryTable();

            window.location.hash = '#detail';
            window.scrollTo(0, 0);
        }

        window.goBackToMainFromDetail = function() {
            window.history.back();
        }

        window.goBackToMainFromTotal = function() {
            window.history.back();
        }

        window.updateSummaryTable = function() {
            const tbody = document.getElementById('summary-table-body');
            tbody.innerHTML = '';

            let totalHours = 0;
            userAddedRecords.forEach((rec) => {
                if (rec.emp === currentEmployee) {
                    tbody.innerHTML += `<tr>
                        <td style="font-weight:bold;">${rec.month}/${rec.day}</td>
                        <td style="font-weight:bold;">${rec.storeName}</td>
                        <td style="font-weight:bold;">${rec.hours}h</td>
                        <td><button class="btn-edit" onclick="editRecord('${rec.id}')">삭제 후 수정</button></td>
                    </tr>`;
                    totalHours += rec.hours;
                }
            });

            document.querySelector('#summary-total-box span').innerText = parseFloat(totalHours.toFixed(1));
        }

        window.setBreakTime = function(hours, btnElement) {
            selectedBreakTime = hours;
            const buttons = document.querySelectorAll('.break-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            window.calculateTime();
        }

        window.calculateTime = function() {
            const sh = document.getElementById('start-hour').value;
            const sm = document.getElementById('start-min').value;
            const eh = document.getElementById('end-hour').value;
            const em = document.getElementById('end-min').value;

            if (sh==='' || sm==='' || eh==='' || em==='') { 
                document.getElementById('result-box').style.display = 'none';
                return; 
            }

            let startNum = parseFloat(sh) + (parseFloat(sm) / 60);
            let endNum = parseFloat(eh) + (parseFloat(em) / 60);

            if (endNum < startNum) endNum += 24;

            let diffHours = endNum - startNum;
            diffHours -= selectedBreakTime;

            const resultBox = document.getElementById('result-box');
            if (diffHours < 0) { 
                resultBox.innerHTML = '<span style="color:#D32F2F;">휴게시간 에러</span>';
                resultBox.style.display = 'block';
                return; 
            }

            let decimalTime = Math.round(diffHours * 10) / 10;
            resultBox.innerHTML = `총 <span id="total-hours" style="font-weight:bold;">${decimalTime}</span>시간`;
            resultBox.style.display = 'block';
        }

        window.saveRecord = async function() {
            const sh = document.getElementById('start-hour').value;
            const sm = document.getElementById('start-min').value;
            const eh = document.getElementById('end-hour').value;
            const em = document.getElementById('end-min').value;
            const month = document.getElementById('input-month').value;
            const day = document.getElementById('input-day').value;
            
            if(!month || !day || sh==='' || sm==='' || eh==='' || em==='') {
                window.showMessage("시간을 모두 입력해주세요.");
                return;
            }
            if(document.getElementById('result-box').style.display === 'none' || document.getElementById('result-box').innerHTML.includes('에러')) {
                window.showMessage("계산 오류. 시간을 다시 확인하세요.");
                return;
            }
            
            const hours = parseFloat(document.getElementById('total-hours').innerText) || 0;
            const timeRange = `${sh}:${sm.padStart(2,'0')}~${eh}:${em.padStart(2,'0')}`;

            if (hours > 0) {
                window.showMessage("저장 중...");
                await addDoc(recordsRef, {
                    emp: currentEmployee,
                    storeId: currentStoreId,
                    storeName: currentStoreId === 'jungcha' ? '정이 있는 차' : '수헌재',
                    month: parseInt(month),
                    day: parseInt(day),
                    timeRange: timeRange,
                    breakTime: selectedBreakTime,
                    hours: hours,
                    createdAt: new Date().getTime()
                });
            }

            window.showMessage("✅ 추가되었습니다.");
            
            document.getElementById('start-hour').value = '';
            document.getElementById('start-min').value = '';
            document.getElementById('end-hour').value = '';
            document.getElementById('end-min').value = '';
            document.getElementById('result-box').style.display = 'none';
            window.setBreakTime(0, document.querySelectorAll('.break-btn')[0]);

            window.scrollTo(0, 0);
        }

        window.editRecord = async function(id) {
            const rec = userAddedRecords.find(r => r.id === id);
            if(!rec) return;

            document.getElementById('input-month').value = rec.month;
            document.getElementById('input-day').value = rec.day;
            
            const times = rec.timeRange.split('~');
            const start = times[0].split(':');
            const end = times[1].split(':');
            
            document.getElementById('start-hour').value = start[0];
            document.getElementById('start-min').value = start[1];
            document.getElementById('end-hour').value = end[0];
            document.getElementById('end-min').value = end[1];
            
            const breakBtns = Array.from(document.querySelectorAll('.break-btn'));
            const matchingBtn = breakBtns.find(b => parseFloat(b.innerText) === rec.breakTime);
            window.setBreakTime(rec.breakTime, matchingBtn || breakBtns[0]);
            
            await deleteDoc(doc(db, 'records', id));
            
            document.getElementById('form-card').scrollIntoView({ behavior: 'smooth' });
        }

        window.openTotalView = function() {
            window.location.hash = '#total';
            window.scrollTo(0, 0);

            const empData = {};

            ['jungcha', 'suhyun'].forEach(storeId => {
                const allEmps = [...storeData[storeId].employees, ...(userAddedEmployees[storeId] || [])];
                const uniqueEmps = [...new Set(allEmps)];
                uniqueEmps.forEach(emp => {
                    if(!empData[emp]) empData[emp] = { total: 0, shifts: [] };
                });
            });

            userAddedRecords.forEach(r => {
                if(!empData[r.emp]) empData[r.emp] = { total: 0, shifts: [] };
                empData[r.emp].total += parseFloat(r.hours);
                const sName = r.storeName.includes('정') ? '정차' : '수헌재';
                empData[r.emp].shifts.push(`└ ${r.month}/${r.day} | ${sName} | ${r.timeRange} | ${r.hours}시간`);
            });

            const listHtml = Object.keys(empData).sort().map((emp, i) => {
                const d = empData[emp];
                const roundedTotal = Math.round(d.total * 10) / 10;
                const shiftList = d.shifts.length > 0 ? d.shifts.join('<br>') : '<span style="color:#999;">입력된 기록이 없습니다.</span>';
                
                return `
                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAccordion('acc-${i}', this)">
                            <span class="emp-name">${emp}</span> 
                            <span class="arrow">▼</span>
                        </div>
                        <div class="accordion-body" id="acc-${i}">
                            <div style="margin-bottom: 8px; font-weight: bold; color: var(--text-main);">
                                총 누적: ${roundedTotal}시간
                            </div>
                            ${shiftList}
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('total-list-container').innerHTML = listHtml;
        }

        window.toggleAccordion = function(id, el) {
            const body = document.getElementById(id);
            const arrow = el.querySelector('.arrow');
            const empName = el.querySelector('.emp-name');
            
            if(body.style.display === 'block') {
                body.style.display = 'none';
                arrow.innerText = '▼';
                arrow.style.color = 'var(--text-main)';
                empName.style.color = 'var(--text-main)';
            } else {
                body.style.display = 'block';
                arrow.innerText = '▲';
                arrow.style.color = '#3b82f6'; 
                empName.style.color = '#3b82f6';
            }
        }
